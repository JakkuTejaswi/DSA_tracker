services:
  # Backend Web Service
  - type: web
    name: dsa-tracker-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsa-db
          property: connectionString
      - key: SECRET_KEY
        value: 4f7a1b3c9e2d5f8a0b1c3d5e7f9a2b4c6d8e0f1a3b5c7d9e1f
      - key: ALGORITHM
        value: HS256
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: dsatracker6@gmail.com
      - key: SMTP_PASS
        value: axbebtkdztbyqlvk

  # Frontend Static Site
  - type: static
    name: dsa-tracker-frontend
    buildCommand: npm run build
    publishDir: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://dsa-tracker-backend.onrender.com

databases:
  - name: dsa-db
    plan: free
