services:
  # Backend Web Service
  - type: web
    name: dsa-tracker-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: FRONTEND_URL
        fromService:
          type: static
          name: dsa-tracker-frontend
          property: host
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: dsatracker6@gmail.com
      - key: SMTP_PASS
        value: axbebtkdztbyqlvk

  # Frontend Static Site
  - type: static
    name: dsa-tracker-frontend
    env: static
    buildCommand: npm run build
    publishDir: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: dsa-tracker-backend
          property: host

databases:
  - name: dsa-db
    plan: free
